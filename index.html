<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Chess</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            margin-top: 50px;
        }

        h1 {
            margin-bottom: 10px;
        }

        #status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
            color: #ecf0f1;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 4px solid #34495e;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .square {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
        }

        .light {
            background-color: #f0d9b5;
        }

        .dark {
            background-color: #b58863;
        }

        .selected {
            background-color: #baca2b !important;
        }

        .highlight {
            position: relative;
        }

        .highlight::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
        }

        .white-piece { color: #fff; text-shadow: 1px 1px 2px #000; }
        .black-piece { color: #000; }

        @media (max-width: 600px) {
            #board {
                grid-template-columns: repeat(8, 45px);
                grid-template-rows: repeat(8, 45px);
            }
            .square {
                width: 45px;
                height: 45px;
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

    <h1>JavaScript Chess</h1>
    <div id="status">White's Turn</div>
    <div id="board"></div>

    <script>
        const BOARD_SIZE = 8;
        let board = [];
        let currentPlayer = 'white';
        let selectedSquare = null;

        // Unicode chess pieces
        const PIECES = {
            'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙', // White
            'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟'  // Black
        };

        const INITIAL_BOARD = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        function initGame() {
            // Deep copy initial board
            board = INITIAL_BOARD.map(row => [...row]);
            renderBoard();
            updateStatus();
        }

        function renderBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';

            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    // Alternating colors
                    if ((r + c) % 2 === 0) {
                        square.classList.add('light');
                    } else {
                        square.classList.add('dark');
                    }

                    // Add piece if exists
                    const piece = board[r][c];
                    if (piece) {
                        square.textContent = PIECES[piece];
                        square.classList.add(isWhite(piece) ? 'white-piece' : 'black-piece');
                    }

                    // Highlight selected
                    if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) {
                        square.classList.add('selected');
                    }

                    square.dataset.r = r;
                    square.dataset.c = c;
                    square.addEventListener('click', handleSquareClick);

                    boardElement.appendChild(square);
                }
            }
        }

        function isWhite(piece) {
            return piece === piece.toUpperCase() && piece !== '';
        }

        function handleSquareClick(e) {
            const r = parseInt(e.currentTarget.dataset.r);
            const c = parseInt(e.currentTarget.dataset.c);
            const clickedPiece = board[r][c];

            // If a square is already selected
            if (selectedSquare) {
                // If clicking the same square, deselect
                if (selectedSquare.r === r && selectedSquare.c === c) {
                    selectedSquare = null;
                    renderBoard();
                    return;
                }

                // If clicking another of own pieces, change selection
                if (clickedPiece && (isWhite(clickedPiece) === (currentPlayer === 'white'))) {
                    selectedSquare = { r, c };
                    renderBoard();
                    return;
                }

                // Attempt to move
                if (isValidMove(selectedSquare.r, selectedSquare.c, r, c)) {
                    // Move piece
                    board[r][c] = board[selectedSquare.r][selectedSquare.c];
                    board[selectedSquare.r][selectedSquare.c] = '';
                    
                    // Switch turns
                    currentPlayer = currentPlayer === 'white' ? 'black' : 'white';
                    selectedSquare = null;
                    updateStatus();
                    renderBoard();
                }
            } else {
                // Select a piece if it belongs to current player
                if (clickedPiece && (isWhite(clickedPiece) === (currentPlayer === 'white'))) {
                    selectedSquare = { r, c };
                    renderBoard();
                }
            }
        }

        function isValidMove(startR, startC, endR, endC) {
            const piece = board[startR][startC];
            const targetPiece = board[endR][endC];
            const type = piece.toUpperCase();
            
            // Cannot capture own piece
            if (targetPiece && (isWhite(piece) === isWhite(targetPiece))) return false;

            const dR = endR - startR;
            const dC = endC - startC;
            const absR = Math.abs(dR);
            const absC = Math.abs(dC);

            // Path collision check (except for knights)
            if (type !== 'N') {
                const stepR = dR === 0 ? 0 : dR / absR;
                const stepC = dC === 0 ? 0 : dC / absC;
                
                let currR = startR + stepR;
                let currC = startC + stepC;
                
                while (currR !== endR || currC !== endC) {
                    if (board[currR][currC] !== '') return false; // Path blocked
                    currR += stepR;
                    currC += stepC;
                }
            }

            // Piece-specific rules
            switch (type) {
                case 'P': // Pawn
                    const direction = isWhite(piece) ? -1 : 1;
                    const startRow = isWhite(piece) ? 6 : 1;
                    
                    // Move forward
                    if (dC === 0 && targetPiece === '') {
                        if (dR === direction) return true;
                        if (dR === direction * 2 && startR === startRow && board[startR + direction][startC] === '') return true;
                    }
                    // Capture diagonal
                    if (absC === 1 && dR === direction && targetPiece !== '') return true;
                    return false;
                    
                case 'R': // Rook
                    return dR === 0 || dC === 0;
                    
                case 'N': // Knight
                    return (absR === 2 && absC === 1) || (absR === 1 && absC === 2);
                    
                case 'B': // Bishop
                    return absR === absC;
                    
                case 'Q': // Queen
                    return (absR === absC) || (dR === 0 || dC === 0);
                    
                case 'K': // King
                    return absR <= 1 && absC <= 1;
            }
            return false;
        }

        function updateStatus() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = `${currentPlayer.charAt(0).toUpperCase() + currentPlayer.slice(1)}'s Turn`;
        }

        // Start the game
        initGame();
    </script>
</body>
</html>
